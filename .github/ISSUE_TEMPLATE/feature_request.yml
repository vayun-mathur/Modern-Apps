name: ✨ Feature Request
description: Suggest a new idea for a specific app.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: app_name
    attributes:
      label: App Name
      description: Which app is this feature for?
      options:
        - alchemist
        - astronomy
        - calendar
        - camera
        - chess
        - clock
        - contacts
        - education
        - email
        - everysync
        - files
        - findfamily
        - health
        - maps
        - messages
        - music
        - notes
        - office
        - openassistant
        - passwords
        - pdf
        - photos
        - pipes
        - solitaire
        - things
        - travel
        - unblockjam
        - weather
        - wordmaker
        - youpipe
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature should be added and why is it important?
      placeholder: Describe the "what" and the "why" here.
    validations:
      required: true
