name: 🐛 Bug Report
description: Report a bug or crash in a specific app.
title: "[bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: app_name
    attributes:
      label: App Name
      description: Which app is experiencing the issue?
      options:
        - alchemist
        - astronomy
        - calendar
        - camera
        - chess
        - clock
        - contacts
        - education
        - email
        - everysync
        - files
        - findfamily
        - health
        - maps
        - messages
        - music
        - notes
        - office
        - openassistant
        - passwords
        - pdf
        - photos
        - pipes
        - solitaire
        - things
        - travel
        - unblockjam
        - weather
        - wordmaker
        - youpipe
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of the app are you running? (e.g., v1.0.2)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Type
      description: What device are you running and what Android version is it using? (e.g., Pixel 9 Android 15)
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: What is the bug?
      description: A clear and concise description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: What specific steps cause the bug to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log Files
      description: If the app crashed, please paste the log files here, or upload a log file
