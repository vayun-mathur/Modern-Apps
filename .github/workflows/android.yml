name: "🚀 Publish Next Release"

on:
  workflow_dispatch:

env:
  ks_filename: release_keystore.jks
  ks_store_pass: ${{ secrets.KS_STORE_PASS }}
  ks_alias: ${{ secrets.KS_ALIAS }}
  ks_alias_pass: ${{ secrets.KS_ALIAS_PASS }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Clean Project Files
        run: |
          if [ -f "settings.gradle.kts" ]; then
            echo "Removing local includeBuild from settings.gradle.kts..."
            sed -i '/includeBuild.*NewPipeExtractor/,/^}/d' settings.gradle.kts
          fi

          if [ -f "build.gradle.kts" ]; then
            echo "Removing debug signingConfig from root build.gradle.kts..."
            sed -i '/signingConfig = signingConfigs.getByName("debug")/d' build.gradle.kts
          fi

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > ${{ env.ks_filename }}

      - name: Change Gradle Wrapper Permissions
        run: chmod +x ./gradlew

      - name: Read and Inject Version
        id: version_info
        run: |
          VERSION_FILE="version.txt"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "Error: $VERSION_FILE not found!"
            exit 1
          fi

          VERSION_CODE=$(sed -n '1p' "$VERSION_FILE" | tr -d '\r' | xargs)
          VERSION_NAME=$(sed -n '2p' "$VERSION_FILE" | tr -d '\r' | xargs)

          echo "Using Version Name: $VERSION_NAME"
          echo "Using Version Code: $VERSION_CODE"
          
          find . -mindepth 2 -name "build.gradle.kts" | \
            grep -vE '^\./(library/|watch/shared/)' | while read file; do
            sed -i '/versionCode[[:space:]]*=[[:space:]]*/d' "$file"
            sed -i '/versionName[[:space:]]*=[[:space:]]*/d' "$file"
            sed -i "/defaultConfig[[:space:]]*{/a \        versionCode = $VERSION_CODE\n        versionName = \"$VERSION_NAME\"" "$file"
          done

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Detect App Modules
        run: |
          RAW_DIRS=$(grep -rl "versionCode" . --include="build.gradle.kts" | \
            grep -vE "^\./build.gradle.kts$" | \
            sed 's|^\./||; s|/build.gradle.kts$||' | \
            grep -vE '^library(/|$)|^watch/shared$' | sort -u)
          
          REVERSED_DIRS=$(echo "$RAW_DIRS" | tac | tr '\n' ' ')
          echo "module_dirs=$REVERSED_DIRS" >> $GITHUB_ENV

      - name: Prepare F-Droid Metadata
        run: |
          # Play/F-Droid listing icons are generated here (only in CI) from each app's
          # launcherIcon symbol + ic_launcher_background, instead of committing a
          # per-app ic_launcher-playstore.png. Mirrors GenerateLauncherIconTask: the
          # outlined Material Symbol glyph (black), scaled within a solid background.
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin imagemagick >/dev/null
          MATERIAL_SYMBOLS_REF="819d78680a849ceef4c78f863d8753e3160b7c89"
          DEFAULT_BG="#FFFFFF"

          for dir in ${{ env.module_dirs }}; do
            module_key=$(echo $dir | sed 's|/|-|g')
            target_path="$dir/src/main/play/listings/en-US"

            mkdir -p "$target_path/graphics/icon"
            mkdir -p "$target_path/graphics/phone-screenshots"

            # --- Generate the 512x512 Play Store icon ---
            symbol=$(grep -oE 'symbol[[:space:]]*=[[:space:]]*"[^"]+"' "$dir/build.gradle.kts" 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -n "$symbol" ]; then
              # NOTE: these end in `grep`, which exits non-zero when there is no
              # match. Under `bash -e` that would abort the whole step, so each is
              # made non-fatal with `|| true` and falls back to a default below.
              scale=$(grep -oE 'scale[[:space:]]*=[[:space:]]*[0-9.]+' "$dir/build.gradle.kts" 2>/dev/null | head -1 | grep -oE '[0-9.]+' || true)
              scale=${scale:-0.58}
              bg=$(grep -rhoE '<color name="ic_launcher_background">#[0-9A-Fa-f]+' "$dir/src/main/res" 2>/dev/null | head -1 | grep -oE '#[0-9A-Fa-f]+' || true)
              bg=${bg:-$DEFAULT_BG}
              glyph_px=$(awk "BEGIN{printf \"%d\", 512*$scale}")
              svg_url="https://raw.githubusercontent.com/google/material-design-icons/$MATERIAL_SYMBOLS_REF/symbols/web/$symbol/materialsymbolsoutlined/${symbol}_24px.svg"
              if curl -sf "$svg_url" -o /tmp/glyph.svg; then
                rsvg-convert -w "$glyph_px" -h "$glyph_px" /tmp/glyph.svg -o /tmp/glyph.png
                convert -size 512x512 "xc:$bg" /tmp/glyph.png -gravity center -composite "$target_path/graphics/icon/icon.png"
                echo "Generated icon for $dir ($symbol on $bg, scale $scale)"
              else
                echo "WARNING: could not fetch Material Symbol '$symbol' for $dir"
              fi
            else
              echo "WARNING: no launcherIcon symbol found for $dir"
            fi

            screenshot_dir="metadata_data/photos/${module_key}"
            screenshot_file="metadata_data/photos/${module_key}.png"
            if [ -d "$screenshot_dir" ]; then
              cp "$screenshot_dir"/*.png "$target_path/graphics/phone-screenshots/" 2>/dev/null || true
            elif [ -f "$screenshot_file" ]; then
              cp "$screenshot_file" "$target_path/graphics/phone-screenshots/1.png"
            fi

            metadata_src="metadata_data/${module_key}.md"
            if [ -f "$metadata_src" ]; then
              head -n 1 "$metadata_src" > "$target_path/short-description.txt"
              cp "$metadata_src" "$target_path/full-description.txt"
            fi
          done

      - name: Local Git Commit and Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          VERSION_NAME="${{ steps.version_info.outputs.version_name }}"
          
          git commit -m "chore: prepare release $VERSION_NAME" || echo "No changes to commit"
          git tag "$VERSION_NAME"

      - name: Install Android Rust Target
        run: rustup target add aarch64-linux-android

      - name: Build and Sign APKs
        run: |
          # Always build release APKs for every app module.
          ./gradlew assembleRelease \
            --no-daemon \
            -x lint \
            -x test \
            -Pandroid.enableResourceOptimizations=true \
            -Pandroid.enableR8.fullMode=true \
            -PRELEASE_STORE_FILE="${{ github.workspace }}/${{ env.ks_filename }}" \
            -PRELEASE_STORE_PASSWORD="${{ env.ks_store_pass }}" \
            -PRELEASE_KEY_ALIAS="${{ env.ks_alias }}" \
            -PRELEASE_KEY_PASSWORD="${{ env.ks_alias_pass }}"

          # Consolidate all generated APKs into one directory
          mkdir -p distribution_apks
          find . -path "*/build/outputs/apk/release/*.apk" -exec cp {} distribution_apks/ \;

      - name: Push Tag Only
        if: success()
        run: |
          VERSION_NAME="${{ steps.version_info.outputs.version_name }}"
          git push origin "$VERSION_NAME"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version_info.outputs.version_name }}"
          name: "Release ${{ steps.version_info.outputs.version_name }}"
          draft: true
          body: |
            Automated multi-module release.
            Version Name: ${{ steps.version_info.outputs.version_name }}
            Version Code: ${{ steps.version_info.outputs.version_code }}
          files: distribution_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keystore
        if: always()
        run: rm -f ${{ env.ks_filename }}