syntax = "proto2";
package whatsapp.e2e;
option java_package = "com.vayunmathur.messages.whatsapp.proto";
option java_outer_classname = "WhatsAppE2EProto";

message MessageKey {
    optional bool fromMe = 1;
    optional string id = 2;
    optional string remoteJid = 3;
    optional string participant = 4;
}

message ContextInfo {
    optional string stanzaId = 1;
    optional string participant = 2;
    optional Message quotedMessage = 3;
    optional string remoteJid = 4;
    repeated string mentionedJid = 15;
    optional string conversionSource = 18;
    optional bytes conversionData = 19;
    optional uint32 conversionDelaySeconds = 20;
    optional uint32 forwardingScore = 21;
    optional bool isForwarded = 22;
    optional MessageKey quotedAd = 23;
    optional string ephemeralSettingTimestamp = 36;
}

message FutureProofMessage {
    optional Message message = 1;
}

message Message {
    optional string conversation = 1;
    optional ExtendedTextMessage extendedTextMessage = 6;
    optional ImageMessage imageMessage = 3;
    optional VideoMessage videoMessage = 5;
    optional AudioMessage audioMessage = 8;
    optional DocumentMessage documentMessage = 7;
    optional StickerMessage stickerMessage = 26;
    optional ContactMessage contactMessage = 4;
    optional LocationMessage locationMessage = 16;
    optional ReactionMessage reactionMessage = 46;
    optional PollCreationMessage pollCreationMessage = 49;
    optional PollCreationMessage pollCreationMessageV2 = 60;
    optional PollCreationMessage pollCreationMessageV3 = 64;
    optional PollUpdateMessage pollUpdateMessage = 80;
    optional ProtocolMessage protocolMessage = 12;
    optional SenderKeyDistributionMessage senderKeyDistributionMessage = 2;
    optional DeviceSentMessage deviceSentMessage = 31;
    optional MessageContextInfo messageContextInfo = 35;
    optional FutureProofMessage editedMessage = 58;
}

message ExtendedTextMessage {
    optional string text = 1;
    optional string matchedText = 2;
    optional string canonicalUrl = 4;
    optional string description = 5;
    optional string title = 6;
    optional bytes jpegThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message ImageMessage {
    optional string url = 1;
    optional string mimetype = 2;
    optional string caption = 3;
    optional bytes fileSha256 = 4;
    optional uint64 fileLength = 5;
    optional uint32 height = 6;
    optional uint32 width = 7;
    optional bytes mediaKey = 8;
    optional bytes fileEncSha256 = 9;
    optional string directPath = 11;
    optional int64 mediaKeyTimestamp = 12;
    optional bytes jpegThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message VideoMessage {
    optional string url = 1;
    optional string mimetype = 2;
    optional bytes fileSha256 = 3;
    optional uint64 fileLength = 4;
    optional uint32 seconds = 5;
    optional bytes mediaKey = 6;
    optional string caption = 7;
    optional bool gifPlayback = 8;
    optional uint32 height = 9;
    optional uint32 width = 10;
    optional bytes fileEncSha256 = 11;
    optional string directPath = 13;
    optional int64 mediaKeyTimestamp = 14;
    optional bytes jpegThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message AudioMessage {
    optional string url = 1;
    optional string mimetype = 2;
    optional bytes fileSha256 = 3;
    optional uint64 fileLength = 4;
    optional uint32 seconds = 5;
    optional bool ptt = 6;
    optional bytes mediaKey = 7;
    optional bytes fileEncSha256 = 8;
    optional string directPath = 9;
    optional int64 mediaKeyTimestamp = 10;
    optional ContextInfo contextInfo = 17;
}

message DocumentMessage {
    optional string url = 1;
    optional string mimetype = 2;
    optional string title = 3;
    optional bytes fileSha256 = 4;
    optional uint64 fileLength = 5;
    optional uint32 pageCount = 6;
    optional bytes mediaKey = 7;
    optional string fileName = 8;
    optional bytes fileEncSha256 = 9;
    optional string directPath = 10;
    optional int64 mediaKeyTimestamp = 11;
    optional bytes jpegThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message StickerMessage {
    optional string url = 1;
    optional bytes fileSha256 = 2;
    optional bytes fileEncSha256 = 3;
    optional bytes mediaKey = 4;
    optional string mimetype = 5;
    optional uint32 height = 6;
    optional uint32 width = 7;
    optional string directPath = 8;
    optional uint64 fileLength = 9;
    optional int64 mediaKeyTimestamp = 10;
    optional bool isAnimated = 21;
    optional bytes pngThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message ContactMessage {
    optional string displayName = 1;
    optional string vcard = 16;
    optional ContextInfo contextInfo = 17;
}

message LocationMessage {
    optional double degreesLatitude = 1;
    optional double degreesLongitude = 2;
    optional string name = 3;
    optional string address = 4;
    optional string url = 5;
    optional bytes jpegThumbnail = 16;
    optional ContextInfo contextInfo = 17;
}

message ReactionMessage {
    optional MessageKey key = 1;
    optional string text = 2;
    optional string groupingKey = 3;
    optional int64 senderTimestampMs = 4;
}

message ProtocolMessage {
    enum Type {
        REVOKE = 0;
        EPHEMERAL_SETTING = 3;
        EPHEMERAL_SYNC_RESPONSE = 4;
        HISTORY_SYNC_NOTIFICATION = 5;
        APP_STATE_SYNC_KEY_SHARE = 6;
        APP_STATE_SYNC_KEY_REQUEST = 7;
        MSG_FANOUT_BACKFILL_REQUEST = 8;
        INITIAL_SECURITY_NOTIFICATION_SETTING_SYNC = 9;
        APP_STATE_FATAL_EXCEPTION_NOTIFICATION = 10;
        SHARE_PHONE_NUMBER = 11;
        MESSAGE_EDIT = 14;
        PEER_DATA_OPERATION_REQUEST_MESSAGE = 16;
        PEER_DATA_OPERATION_REQUEST_RESPONSE_MESSAGE = 17;
        PLACEHOLDER_ACTION = 25;
    }

    optional MessageKey key = 1;
    optional Type type = 2;
    optional uint32 ephemeralExpiration = 4;
    optional int64 ephemeralSettingTimestamp = 5;
    optional HistorySyncNotification historySyncNotification = 6;
    optional Message editedMessage = 14;
    optional int64 timestampMs = 15;
    optional PeerDataOperationRequestMessage peerDataOperationRequestMessage = 16;
    optional AppStateSyncKeyShare appStateSyncKeyShare = 7;
    optional AppStateSyncKeyRequest appStateSyncKeyRequest = 8;
}

message AppStateSyncKeyShare {
    repeated AppStateSyncKey keys = 1;
}
message AppStateSyncKey {
    optional AppStateSyncKeyId keyId = 1;
    optional AppStateSyncKeyData keyData = 2;
}
message AppStateSyncKeyId {
    optional bytes keyId = 1;
}
message AppStateSyncKeyData {
    optional bytes keyData = 1;
    optional int64 timestamp = 3;
}
message AppStateSyncKeyRequest {
    repeated AppStateSyncKeyId keyIds = 1;
}

// Request sent to our own account to pull more history on demand. Ref waE2E.
message PeerDataOperationRequestMessage {
    optional int32 peerDataOperationRequestType = 1; // HISTORY_SYNC_ON_DEMAND = 3
    optional HistorySyncOnDemandRequest historySyncOnDemandRequest = 4;
}

message HistorySyncOnDemandRequest {
    optional string chatJid = 1;
    optional string oldestMsgId = 2;
    optional bool oldestMsgFromMe = 3;
    optional int32 onDemandMsgCount = 4;
    optional int64 oldestMsgTimestampMs = 5;
}

// Points to the (optionally inline) compressed HistorySync blob. Ref waE2E HistorySyncNotification.
message HistorySyncNotification {
    optional bytes fileSha256 = 1;
    optional uint64 fileLength = 2;
    optional bytes mediaKey = 3;
    optional bytes fileEncSha256 = 4;
    optional string directPath = 5;
    optional uint32 syncType = 6;
    optional uint32 chunkOrder = 7;
    optional string originalMessageId = 8;
    optional bytes initialHistBootstrapInlinePayload = 11;
}

// WhatsApp's real MessageKey field numbers (the app's MessageKey above is mis-numbered);
// used for history-sync WebMessageInfo. Ref WACommon.MessageKey.
message HsMsgKey {
    optional string remoteJid = 1;
    optional bool fromMe = 2;
    optional string id = 3;
    optional string participant = 4;
}

// Ref WAWebProtobufsWeb.WebMessageInfo (subset).
message WebMessageInfo {
    optional HsMsgKey key = 1;
    optional Message message = 2;
    optional uint64 messageTimestamp = 3;
    optional string pushName = 19;
}

message HistorySyncMsg {
    optional WebMessageInfo message = 1;
    optional uint64 msgOrderId = 2;
}

// Ref waHistorySync.Conversation (subset).
message HsConversation {
    optional string id = 1;
    repeated HistorySyncMsg messages = 2;
    optional string newJid = 3;
    optional uint32 unreadCount = 6;
    optional uint64 conversationTimestamp = 12;
    optional string name = 13;
}

// The decompressed history-sync blob. Ref waHistorySync.HistorySync (subset).
message HistorySync {
    optional uint32 syncType = 1;
    repeated HsConversation conversations = 2;
    optional uint32 chunkOrder = 5;
    optional uint32 progress = 6;
    repeated PhoneNumberToLIDMapping phoneNumberToLidMappings = 15;
}

message PhoneNumberToLIDMapping {
    optional string pnJid = 1;
    optional string lidJid = 2;
}

message SenderKeyDistributionMessage {
    optional string groupId = 1;
    optional bytes axolotlSenderKeyDistributionMessage = 2;
}

message DeviceSentMessage {
    optional string destinationJid = 1;
    optional Message message = 2;
    optional string phash = 3;
}

message MessageContextInfo {
    // Field number MUST be 3 to match WhatsApp/whatsmeow — poll vote key derivation reads this
    // secret off the original poll message, so the wire field must line up with the peer.
    optional bytes messageSecret = 3;
}

// Native poll creation. Mirrors whatsmeow waE2E.PollCreationMessage. At creation time only
// optionName is set (option hashes are computed at vote time); the poll's shared secret lives in
// the sibling MessageContextInfo.messageSecret, not in encKey.
message PollCreationMessage {
    message Option {
        optional string optionName = 1;
        optional string optionHash = 2;
    }

    optional bytes encKey = 1;
    optional string name = 2;
    repeated Option options = 3;
    optional uint32 selectableOptionsCount = 4;
    optional ContextInfo contextInfo = 5;
}

// A cast poll vote. Mirrors whatsmeow waE2E.PollVoteMessage: the selected options are SHA-256
// hashes of the option names, encrypted (see PollUpdateMessage) so only poll participants see them.
message PollVoteMessage {
    repeated bytes selectedOptions = 1;
}

// Encrypted poll-vote payload (AES-256-GCM). Mirrors whatsmeow waE2E.PollEncValue.
message PollEncValue {
    optional bytes encPayload = 1;
    optional bytes encIV = 2;
}

// Wraps an encrypted poll vote, pointing back at the poll it belongs to. Mirrors whatsmeow
// waE2E.PollUpdateMessage.
message PollUpdateMessage {
    optional MessageKey pollCreationMessageKey = 1;
    optional PollEncValue vote = 2;
    optional int64 senderTimestampMS = 4;
}
