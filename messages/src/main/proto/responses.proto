syntax = "proto3";
package responses;
option go_package = "../gvproto";

import "threads.proto";
import "account.proto";
import "contacts.proto";

message RespGetThread {
    threads.Thread thread = 1;
}

message RespListThreads {
    repeated threads.Thread threads = 1;
    string versionToken = 3;
}

message RespSendSMS {
    string threadID = 2;
    string threadItemID = 3;
    int64 timestampMS = 4;
    repeated threads.ThreadFolder threadFolders = 5;
}

message RespUpdateAttributes {
    threads.ThreadAttributes attributes = 1;
}

message RespBatchUpdateAttributes {
    RespUpdateAttributes items = 1;
}

message RespGetAccount {
    account.Account account = 1;
}

message RespDeleteThread {

}

message RespAutocompleteContacts {
    message AffinityResponseContext {
        message Feature {
            enum Type {
                UNKNOWN_TYPE = 0;
                IS_CONTACT_STARRED = 6;
                HAS_POSTAL_ADDRESS = 7;
                HAS_NICKNAME = 8;
                HAS_AVATAR = 11;
                NUM_RAW_CONTACTS = 16;
            }

            Type type = 1;
            double weight = 2;
            double exponent = 3;
        }
        int32 affinityVersion = 1;
        repeated Feature features = 3;
    }

    repeated contacts.PersonWrapper results = 1;
    AffinityResponseContext affinityResponseContext = 2;
}

message RespLookupContacts {
    message Match {
        enum FailureType {
            NO_FAILURE = 0;
            PERMANENT = 1;
        }

        contacts.ContactID ID = 1;
        contacts.PersonWrapper autocompletion = 2;
        FailureType failureType = 3;
    }

    repeated Match matches = 1;
}

message RespGetSIPRegisterInfo {
    SIPRegisterInfo sip_register_info = 1;
    // Field 4 contains nested credentials based on live API response
    SIPCredentials credentials = 4;
}

message SIPRegisterInfo {
    // Actual structure from live API: fields 1 and 2 are integers
    // Likely timestamps or IDs, not username/password as initially guessed
    int64 field_1 = 1;  // 1784825405 in test response (possibly expiry timestamp?)
    int64 field_2 = 2;  // 949940000 in test response
}

message SIPCredentials {
    // Field 4 in response contains nested message with 2 string fields
    // These appear to be the actual SIP auth tokens
    string token_1 = 1;  // Long base64url-like token (~175 chars)
    string token_2 = 2;  // Shorter base64 token (~24 chars, ends with ==)
}

// Legacy guessed structure kept for reference but not used by actual API
message SIPRegisterInfoLegacy {
    string username = 1;
    string password = 2;
    string domain = 3;
    string proxy_server = 4;
    int32 expires_seconds = 5;
    string display_name = 6;
    string authorization_id = 7;
    string realm = 8;
}
